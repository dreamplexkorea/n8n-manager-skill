version: '3.8'

# ============================================================
# n8n 자동화 서버 Docker Compose 템플릿
# 사용법: 아래 변수들을 환경에 맞게 수정 후 docker-compose up -d
# ============================================================

services:
  # PostgreSQL 데이터베이스
  n8n-db:
    image: postgres:15-alpine
    container_name: n8n-postgres
    restart: unless-stopped
    environment:
      - POSTGRES_DB=n8n
      - POSTGRES_USER=n8n
      # ⚠️ 반드시 변경하세요!
      - POSTGRES_PASSWORD=${DB_PASSWORD:-change_me_secure_password}
      - TZ=${TIMEZONE:-Asia/Seoul}
    volumes:
      - ./db:/var/lib/postgresql/data
    networks:
      - n8n-network
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -h localhost -U n8n']
      interval: 10s
      timeout: 5s
      retries: 5

  # n8n 애플리케이션
  n8n:
    image: n8nio/n8n:latest
    container_name: n8n-app
    restart: unless-stopped
    user: "0:0"
    ports:
      # ⚠️ 호스트 포트를 환경에 맞게 변경하세요
      - "${N8N_PORT:-5678}:5678"
    environment:
      # 데이터베이스 설정
      - DB_TYPE=postgresdb
      - DB_POSTGRESDB_HOST=n8n-db
      - DB_POSTGRESDB_PORT=5432
      - DB_POSTGRESDB_DATABASE=n8n
      - DB_POSTGRESDB_USER=n8n
      - DB_POSTGRESDB_PASSWORD=${DB_PASSWORD:-change_me_secure_password}

      # n8n 서버 설정
      - N8N_HOST=0.0.0.0
      - N8N_PORT=5678
      - N8N_PROTOCOL=http
      # ⚠️ 외부 접근 URL — 공인 IP 또는 도메인으로 변경하세요
      - WEBHOOK_URL=${WEBHOOK_URL:-http://localhost:5678}
      # ⚠️ 고유한 암호화 키 생성: openssl rand -hex 32
      - N8N_ENCRYPTION_KEY=${ENCRYPTION_KEY:-generate_with_openssl_rand_hex_32}

      # 타임존
      - GENERIC_TIMEZONE=${TIMEZONE:-Asia/Seoul}
      - TZ=${TIMEZONE:-Asia/Seoul}

      # 운영 설정
      - N8N_LOG_LEVEL=info
      - EXECUTIONS_DATA_PRUNE=true
      - EXECUTIONS_DATA_MAX_AGE=336
      - N8N_VERSION_NOTIFICATIONS_ENABLED=false
      - N8N_DIAGNOSTICS_ENABLED=false
      - N8N_PERSONALIZATION_ENABLED=false

    volumes:
      - ./data:/home/node/.n8n
      - ./files:/files
    networks:
      - n8n-network
    depends_on:
      n8n-db:
        condition: service_healthy

networks:
  n8n-network:
    driver: bridge
